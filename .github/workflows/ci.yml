name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: telegram_summary_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d telegram_summary_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/telegram_summary_test?sslmode=disable
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/telegram_summary_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go mod download
      - run: go vet ./...
      - run: go run ./cmd/migrate -direction up -dir migrations
      - run: go test ./...
      - run: go build ./cmd/...
      - run: docker build -f deployments/docker/api.Dockerfile .
