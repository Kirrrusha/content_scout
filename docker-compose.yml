services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: telegram_summary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_summary"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: deployments/docker/migrate.Dockerfile
    env_file: .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/data/logs}
      LOG_RETENTION: ${LOG_RETENTION:-24h}
      LOG_ROTATION_INTERVAL: ${LOG_ROTATION_INTERVAL:-1h}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-direction", "up", "-dir", "migrations"]
    restart: "no"
    volumes:
      - ./data/logs:/data/logs

  api:
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
      args:
        TDLIB_GIT_REF: ${TDLIB_GIT_REF:-master}
    env_file: .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/data/logs}
      LOG_RETENTION: ${LOG_RETENTION:-24h}
      LOG_ROTATION_INTERVAL: ${LOG_ROTATION_INTERVAL:-1h}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - tdlib_data:/data/tdlib
      - exports:/data/exports
      - ./data/logs:/data/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: deployments/docker/bot.Dockerfile
      args:
        TDLIB_GIT_REF: ${TDLIB_GIT_REF:-master}
    env_file: .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/data/logs}
      LOG_RETENTION: ${LOG_RETENTION:-24h}
      LOG_ROTATION_INTERVAL: ${LOG_ROTATION_INTERVAL:-1h}
    profiles: ["bot"]
    volumes:
      - tdlib_data:/data/tdlib
      - exports:/data/exports
      - ./data/logs:/data/logs

  tdlib-worker:
    build:
      context: .
      dockerfile: deployments/docker/tdlib-worker.Dockerfile
      args:
        TDLIB_GIT_REF: ${TDLIB_GIT_REF:-master}
    env_file: .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/data/logs}
      LOG_RETENTION: ${LOG_RETENTION:-24h}
      LOG_ROTATION_INTERVAL: ${LOG_ROTATION_INTERVAL:-1h}
    profiles: ["tdlib"]
    volumes:
      - tdlib_data:/data/tdlib
      - ./data/logs:/data/logs

  summary-worker:
    build:
      context: .
      dockerfile: deployments/docker/summary-worker.Dockerfile
    env_file: .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/data/logs}
      LOG_RETENTION: ${LOG_RETENTION:-24h}
      LOG_ROTATION_INTERVAL: ${LOG_ROTATION_INTERVAL:-1h}
    profiles: ["worker"]
    volumes:
      - exports:/data/exports
      - ./data/logs:/data/logs

volumes:
  postgres_data:
  tdlib_data:
  exports:
